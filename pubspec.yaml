name: billmed
description: Distributor bill payment tracker for medical retail shops. Flutter offline app.
publish_to: 'none'
version: 2.5.2+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  intl: ^0.19.0
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  http: ^1.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.0.0
  csv: ^6.0.0
  shared_preferences: ^2.3.0
  image_picker: ^1.0.0
  google_mlkit_text_recognition: ^0.13.0
  flutter_local_notifications: ^18.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.21.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
